[fs-generic]
"os/fs" = [
    "OpenDirMessage",
    "OpenFileMessage",
    "CloseFile",
    "CloseDir",
    "CreateDirMessage",
    "ReadFile",
    "SeekFile",
    "WriteFile",
    "TruncateFile",
    "SetLen",
    "GetMetadata",
    "NextEntry",
    "Flush",
    "FlushFs",
    "Remove",
    "Rename",
    "AtomicCopy",
    "AsyncRead",
    "AsyncWrite",
    "AsyncCopyBlock",
    "SubscribeFilesystemEvent",
]
[i2c]
"os/i2c" = [
    "ClaimPeripheral",
    "SingleTransfer",
]
[gpio]
"os/gpio" = [
    "ClaimPin",
    "EnableIrq",
    "SetPin",
    "GetPin",
]
[gui-app]
"os/fs" = [
    "OpenDirMessage",
    "CloseDir",
    "NextEntry",
    "MapFileMessage",
    "GetMetadata",
]
"os/gui-server" = [
    "RegisterAppMessage",
    "RequestRedraw",
    "AnimateNextFrame",
    "SubmitFrame",
    "UpdateKeyboard",
    "HideKeyboard",
    "ShowModal",
]
"os/settings" = [
    "GetSystemTheme",
    "SubscribeSystemTheme",
    "GetDebugTouch",
    "SubscribeDebugTouch",
]
[navigable]
"os/gui-server" = [
    "GetPendingNavRequest",
    "FinishResponse",
    "NavigationCancel",
]
# Per-location filesystem access grants. Required in addition to the
# fs-generic method grants: fs-generic lets the app *call* read/write ops,
# while these let the kernel grant read/write access to each Location
# (Internal/User, Airlock, USB). See docs/05-capabilities-permissions.md.
[fs-access]
"os/fs" = [
    "GetUserReadAccess",
    "GetUserWriteAccess",
    "GetAirlockReadAccess",
    "GetAirlockWriteAccess",
    "GetUsbReadAccess",
    "GetUsbWriteAccess",
]
